spring:
  data:
    redis:
      host: junsong-redis
      port: 6379
      password:
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms
  datasource:
    url: jdbc:mysql://junsong-mysql:3306/junsong-cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: change-me-db-password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: JobHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
      org.quartz.jobStore.tablePrefix: qrtz_
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 15000
      org.quartz.jobStore.class: org.quartz.impl.jdbcjobstore.JobStoreTX

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  typeAliasesPackage: com.junsong.job.domain
  mapperLocations: classpath*:mapper/**/*Mapper.xml

springdoc:
  gatewayUrl: http://localhost:8080
  api-docs:
    enabled: true
  info:
    title: 定时任务
    description: 定时任务API文档
    version: 1.0.0

job:
  executor:
    appname: junsong-job-executor
    address:
    ip:
    port: 9999
    logretentiondays: 30
