worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen       80;
        server_name  junsong.vip www.junsong.vip localhost;

        location = / {
            root   /home/junsong/projects/junsong-ui;
            try_files /showcase.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location / {
            root   /home/junsong/projects/junsong-ui;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location = /showcase.html {
            root   /home/junsong/projects/junsong-ui;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location = /index.html {
            root   /home/junsong/projects/junsong-ui;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location /static/ {
            root   /home/junsong/projects/junsong-ui;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /statics/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://junsong-modules-file:9300;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /prod-api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            set $junsong_gateway junsong-gateway:8080;
            rewrite ^/prod-api/(.*)$ /$1 break;
            proxy_pass http://$junsong_gateway;
        }

        # 避免actuator暴露
        if ($uri ~ "/actuator") {
            return 403;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
