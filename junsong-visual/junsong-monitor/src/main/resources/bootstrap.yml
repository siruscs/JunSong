server:
  port: 9100

spring:
  application:
    name: junsong-monitor
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: junsong-nacos:8848
        username: nacos
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: junsong-nacos:8848
        username: nacos
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
  config:
    import:
      - optional:nacos:application-${SPRING_PROFILES_ACTIVE:dev}.yml
      - optional:nacos:redis-${SPRING_PROFILES_ACTIVE:dev}.yml
      - optional:nacos:junsong-monitor-${SPRING_PROFILES_ACTIVE:dev}.yml
